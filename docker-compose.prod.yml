services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      mongo:
        condition: service_started
    environment:
      - DATABASE_URL=mongodb://mongo:27017/typeracer-tonik
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3000/api/ws}
      - NODE_ENV=production
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    command: --storageEngine=wiredTiger
    restart: unless-stopped

volumes:
  mongo_data:
